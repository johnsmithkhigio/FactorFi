<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .hex {
      fill: rgba(56, 189, 248, 0.12);
      stroke: #38bdf8;
      stroke-width: 6;
      stroke-linejoin: round;
    }
    @media (prefers-color-scheme: light) {
      .hex {
        fill: rgba(14, 165, 233, 0.08);
        stroke: #0ea5e9;
      }
    }
  </style>
  <polygon points="50,10 90,30 90,70 50,90 10,70 10,30" class="hex" />
  <polygon points="50,22 80,37 80,63 50,78 20,63 20,37" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.3" />
</svg>